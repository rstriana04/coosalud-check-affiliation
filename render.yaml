services:
  - type: redis
    name: adres-redis
    region: oregon
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: adres-automation
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false
      - key: TWOCAPTCHA_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          name: adres-redis
          type: redis
          property: connectionString
      - key: ADRES_URL
        value: https://adres.gov.co/consulte-su-eps
      - key: HEADLESS_MODE
        value: true
      - key: TIMEOUT_MS
        value: 30000
      - key: MIN_DELAY_MS
        value: 3000
      - key: MAX_DELAY_MS
        value: 5000
      - key: MAX_WORKERS
        value: 2
      - key: BATCH_SIZE
        value: 10
      - key: MAX_RETRIES
        value: 3
    disk:
      name: adres-storage
      mountPath: /opt/render/project/src/backend
      sizeGB: 1

